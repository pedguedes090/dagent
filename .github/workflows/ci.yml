name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: python -m pip install --upgrade pip

      - run: python -m pip install -e .

      - run: pnpm run check
